name: CCE cloud entitlements scan
description: Install CCE and scan with built-in or custom lenses; run recipe packs; optional diff gate.
author: sks
branding:
  icon: shield
  color: purple
inputs:
  version:
    description: CCE release version (without a leading v), e.g. 0.0.5
    required: false
    default: "0.0.5"
  mode:
    description: "scan (default cce scan) or run (cce run -pack / -recipes)"
    required: false
    default: scan
  folder:
    description: Directory to scan
    required: false
    default: "."
  language:
    description: "Source language: GO, JAVA, AUTO, ..."
    required: false
    default: GO
  filter:
    description: "Entitlement filter for scan mode: all or cloud"
    required: false
    default: cloud
  format:
    description: "Report format for scan mode: json, text, or sarif"
    required: false
    default: json
  mapper-file:
    description: "Scan mode — custom lens YAML path or HTTPS URL (-mapper-file)"
    required: false
    default: ""
  pack:
    description: "Run mode — recipe pack id (e.g. modernization-pack)"
    required: false
    default: ""
  recipes:
    description: "Run mode — comma-separated recipe ids (alternative to pack)"
    required: false
    default: ""
  remote:
    description: "Run mode — load catalog from releases.stackgen.com (-remote)"
    required: false
    default: "false"
  catalog-url:
    description: "Run mode — override catalog.json URL (enterprise self-host)"
    required: false
    default: ""
  packs-url:
    description: "Run mode — override packs.json URL (enterprise self-host)"
    required: false
    default: ""
  output:
    description: Path for the scan report file
    required: false
    default: cce-report.json
  baseline:
    description: Baseline JSON report for cce diff (skip diff when empty)
    required: false
    default: ""
  fail-on-new:
    description: Fail the step when diff finds new entitlements (requires baseline)
    required: false
    default: "true"
  policy:
    description: Optional YAML governance policy for cce diff
    required: false
    default: ""
  diff-output:
    description: Path for diff JSON output (only when baseline is set)
    required: false
    default: cce-diff.json
  upload-artifact:
    description: Upload the scan report (and diff, if any) as workflow artifacts
    required: false
    default: "true"
  artifact-name:
    description: Artifact name when upload-artifact is true
    required: false
    default: cce-entitlements
outputs:
  report-path:
    description: Path to the generated entitlement report
    value: ${{ steps.scan.outputs.report-path }}
  entitlement-count:
    description: Total entitlements in the scan report (json format only)
    value: ${{ steps.scan.outputs.entitlement-count }}
  diff-path:
    description: Path to the diff report when baseline was provided
    value: ${{ steps.diff.outputs.diff-path }}
runs:
  using: composite
  steps:
    - name: Install CCE
      id: install
      shell: bash
      env:
        CCE_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        INSTALL_DIR="${RUNNER_TEMP}/cce"
        mkdir -p "${INSTALL_DIR}"
        ARCH="$(uname -m)"
        case "${ARCH}" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
          *)
            echo "::error::Unsupported runner architecture: ${ARCH}"
            exit 1
            ;;
        esac
        TARBALL="cce_${CCE_VERSION}_linux_${ARCH}.tar.gz"
        URL="https://releases.stackgen.com/binaries/cce/v${CCE_VERSION}/${TARBALL}"
        echo "Downloading CCE ${CCE_VERSION} from ${URL}"
        curl -fsSL "${URL}" -o "${RUNNER_TEMP}/${TARBALL}"
        tar -xzf "${RUNNER_TEMP}/${TARBALL}" -C "${INSTALL_DIR}"
        chmod +x "${INSTALL_DIR}/cce"
        "${INSTALL_DIR}/cce" -version || true
        echo "${INSTALL_DIR}" >> "${GITHUB_PATH}"

    - name: Scan or run recipes
      id: scan
      shell: bash
      env:
        CCE_MODE: ${{ inputs.mode }}
        CCE_FOLDER: ${{ inputs.folder }}
        CCE_LANGUAGE: ${{ inputs.language }}
        CCE_FILTER: ${{ inputs.filter }}
        CCE_FORMAT: ${{ inputs.format }}
        CCE_MAPPER_FILE: ${{ inputs.mapper-file }}
        CCE_PACK: ${{ inputs.pack }}
        CCE_RECIPES: ${{ inputs.recipes }}
        CCE_REMOTE: ${{ inputs.remote }}
        CCE_CATALOG_URL: ${{ inputs.catalog-url }}
        CCE_PACKS_URL: ${{ inputs.packs-url }}
        CCE_OUTPUT: ${{ inputs.output }}
      run: |
        set -euo pipefail
        if [ "${CCE_MODE}" = "run" ]; then
          if [ -z "${CCE_PACK}" ] && [ -z "${CCE_RECIPES}" ]; then
            echo "::error::mode=run requires pack or recipes input"
            exit 1
          fi
          ARGS=(run -folder "${CCE_FOLDER}" -language "${CCE_LANGUAGE}" -output "${CCE_OUTPUT}")
          if [ -n "${CCE_PACK}" ]; then
            ARGS+=(-pack "${CCE_PACK}")
          fi
          if [ -n "${CCE_RECIPES}" ]; then
            ARGS+=(-recipes "${CCE_RECIPES}")
          fi
          if [ "${CCE_REMOTE}" = "true" ]; then
            ARGS+=(-remote)
          fi
          if [ -n "${CCE_CATALOG_URL}" ]; then
            ARGS+=(-catalog-url "${CCE_CATALOG_URL}")
          fi
          if [ -n "${CCE_PACKS_URL}" ]; then
            ARGS+=(-packs-url "${CCE_PACKS_URL}")
          fi
          cce "${ARGS[@]}"
        else
          ARGS=(-folder "${CCE_FOLDER}" -language "${CCE_LANGUAGE}" \
            -filter "${CCE_FILTER}" -format "${CCE_FORMAT}" -output "${CCE_OUTPUT}")
          if [ -n "${CCE_MAPPER_FILE}" ]; then
            ARGS+=(-mapper-file "${CCE_MAPPER_FILE}")
          fi
          cce "${ARGS[@]}"
        fi
        echo "report-path=${CCE_OUTPUT}" >> "${GITHUB_OUTPUT}"
        if command -v jq >/dev/null 2>&1 && [ -f "${CCE_OUTPUT}" ]; then
          COUNT="$(jq -r '.summary.total_entitlements // 0' "${CCE_OUTPUT}")"
          echo "entitlement-count=${COUNT}" >> "${GITHUB_OUTPUT}"
          echo "Entitlements found: ${COUNT}"
        fi

    - name: Diff against baseline
      id: diff
      if: inputs.baseline != ''
      shell: bash
      env:
        CCE_BASELINE: ${{ inputs.baseline }}
        CCE_CURRENT: ${{ inputs.output }}
        CCE_FAIL_ON_NEW: ${{ inputs.fail-on-new }}
        CCE_POLICY: ${{ inputs.policy }}
        CCE_DIFF_OUTPUT: ${{ inputs.diff-output }}
      run: |
        set -euo pipefail
        ARGS=(diff "${CCE_BASELINE}" "${CCE_CURRENT}" -output "${CCE_DIFF_OUTPUT}")
        if [ -n "${CCE_POLICY}" ]; then
          ARGS+=(-policy "${CCE_POLICY}")
        fi
        if [ "${CCE_FAIL_ON_NEW}" = "true" ]; then
          ARGS+=(--fail-new)
        fi
        cce "${ARGS[@]}"
        echo "diff-path=${CCE_DIFF_OUTPUT}" >> "${GITHUB_OUTPUT}"

    - name: Upload scan report
      if: inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output }}

    - name: Upload diff report
      if: inputs.upload-artifact == 'true' && inputs.baseline != ''
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}-diff
        path: ${{ inputs.diff-output }}
        if-no-files-found: ignore
